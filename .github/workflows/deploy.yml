name: CI/CD — RAG LLMOps Pipeline v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rag-llmops

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Lint (flake8 + black + isort)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 flake8-bugbear black isort

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 || true

      - name: Check black formatting
        run: black --check --line-length=100 app/

      - name: Check import order (isort)
        run: isort --check-only --profile=black app/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 – Test
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: ""
          REDIS_URL: "redis://localhost:6379"
          REDIS_ENABLED: "false"        # keep tests deterministic
          DATABASE_URL: "sqlite+aiosqlite:///./test_rag.db"
          SECRET_KEY: "test-secret-key-minimum-32-chars-long!!"
          ADMIN_USERNAME: "admin"
          ADMIN_PASSWORD: "secret123"   # min 8 chars — matches auth_token fixture in test_api.py
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 – Build & Push Docker Image
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 – Zero-Downtime Deploy to AWS EC2
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Validate SSH Connectivity and DNS
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "=== Testing DNS Resolution ==="
          nslookup "$EC2_HOST" || dig "$EC2_HOST" || echo "DNS lookup failed, but proceeding to TCP test."
          
          echo "=== Testing TCP Port 22 Connectivity ==="
          nc -vzw 5 "$EC2_HOST" 22
          
          echo "=== Testing SSH Authentication ==="
          echo "$EC2_SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          # Fail immediately if authentication fails
          ssh -i private_key.pem -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=10 "$EC2_USER@$EC2_HOST" 'echo "SSH authentication successful!"'
          rm -f private_key.pem

      - name: Deploy via SSH (True Blue/Green Zero-Downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/rag-llmops:latest"

            echo "=== Pulling latest image ==="
            docker pull "$IMAGE"

            echo "=== Determining active deployment port ==="
            # Parse current Nginx port or default to 8000
            CURRENT_PORT=$(grep -oP 'server 127.0.0.1:\K800[0-9]' /etc/nginx/sites-available/rag-llmops || echo "8000")
            
            if [ "$CURRENT_PORT" = "8000" ]; then
              NEW_PORT="8001"
              NEW_CONTAINER="rag_api_blue"
              OLD_CONTAINER="rag_api_green"
            else
              NEW_PORT="8000"
              NEW_CONTAINER="rag_api_green"
              OLD_CONTAINER="rag_api_blue"
            fi
            
            echo "Current active port is $CURRENT_PORT. Deploying new container $NEW_CONTAINER to port $NEW_PORT."

            echo "=== Cleaning up conflicting resources ==="
            docker rm -f "$NEW_CONTAINER" 2>/dev/null || true

            echo "=== Starting new container ($NEW_CONTAINER) ==="
            docker run -d \
              --name "$NEW_CONTAINER" \
              --restart unless-stopped \
              -p "$NEW_PORT":8000 \
              -v rag_vectorstore:/app/vectorstore \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e REDIS_URL="redis://localhost:6379" \
              -e REDIS_ENABLED="true" \
              -e DATABASE_URL="sqlite+aiosqlite:///./rag_llmops.db" \
              "$IMAGE"

            echo "=== Health check on new container ==="
            HEALTHY=false
            for i in $(seq 1 12); do
              if curl -sf http://localhost:$NEW_PORT/health; then
                HEALTHY=true
                echo "New container is healthy!"
                break
              fi
              echo "Waiting ($i/12)..."; sleep 5
            done

            if [ "$HEALTHY" = "false" ]; then
              echo "❌ Health check failed on $NEW_CONTAINER!"
              echo "=== Container Logs ==="
              docker logs "$NEW_CONTAINER" --tail 50
              echo "=== Rolling back ==="
              docker rm -f "$NEW_CONTAINER" 2>/dev/null || true
              exit 1
            fi

            echo "=== Switching Nginx to new container ==="
            sudo sed -i "s/server 127.0.0.1:$CURRENT_PORT/server 127.0.0.1:$NEW_PORT/" /etc/nginx/sites-available/rag-llmops

            if ! sudo nginx -t; then
              echo "❌ Nginx configuration is invalid! Rolling back Nginx config!"
              sudo sed -i "s/server 127.0.0.1:$NEW_PORT/server 127.0.0.1:$CURRENT_PORT/" /etc/nginx/sites-available/rag-llmops
              docker rm -f "$NEW_CONTAINER" 2>/dev/null || true
              exit 1
            fi

            sudo systemctl reload nginx

            echo "=== Stopping old containers ==="
            docker rm -f "$OLD_CONTAINER" 2>/dev/null || true
            # Clean up the old legacy container name if it still exists from prior script versions
            docker rm -f rag_api 2>/dev/null || true

            echo "=== Deployment complete! ==="
            curl -sf http://localhost:$NEW_PORT/health

            echo "=== Pruning old images ==="
            docker image prune -f
