name: CI/CD — RAG LLMOps Pipeline v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rag-llmops

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 – Lint (flake8 + black + isort)
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install flake8 flake8-bugbear black isort

      - name: Run flake8
        run: flake8 app/ --max-line-length=100 --extend-ignore=E203,W503

      - name: Check black formatting
        run: black --check --line-length=100 app/

      - name: Check import order (isort)
        run: isort --check-only --profile=black app/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 – Test
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest pytest-asyncio python-dotenv \
                      pydantic pydantic-settings langchain langchain-community \
                      langchain-openai langchain-text-splitters openai boto3 \
                      faiss-cpu sentence-transformers pypdf docx2txt aiofiles \
                      sqlalchemy aiosqlite python-jose passlib slowapi redis \
                      rank-bm25

      - name: Run tests
        env:
          OPENAI_API_KEY: ""
          REDIS_URL: "redis://localhost:6379"
          REDIS_ENABLED: "false"        # keep tests deterministic
          DATABASE_URL: "sqlite+aiosqlite:///./test_rag.db"
          SECRET_KEY: "test-secret-key-for-ci"
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 – Build & Push Docker Image
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 – Zero-Downtime Deploy to AWS EC2
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH (zero-downtime blue/green)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE="ghcr.io/${{ github.repository_owner }}/rag-llmops:latest"

            echo "=== Pulling latest image ==="
            docker pull "$IMAGE"

            echo "=== Starting new container (blue) ==="
            docker run -d \
              --name rag_api_blue \
              --restart unless-stopped \
              -p 8001:8000 \
              -v rag_vectorstore:/app/vectorstore \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e REDIS_URL="redis://localhost:6379" \
              -e REDIS_ENABLED="true" \
              -e DATABASE_URL="sqlite+aiosqlite:///./rag_llmops.db" \
              "$IMAGE"

            echo "=== Health check on new container ==="
            for i in $(seq 1 10); do
              if curl -sf http://localhost:8001/health; then
                echo "New container is healthy!"
                break
              fi
              echo "Waiting ($i/10)…"; sleep 5
            done

            echo "=== Switching Nginx to new container ==="
            # Update Nginx upstream port then reload (no downtime)
            sudo sed -i 's/server 127.0.0.1:800[0-9]/server 127.0.0.1:8001/' \
              /etc/nginx/sites-available/rag-llmops
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Stopping old container ==="
            docker stop rag_api 2>/dev/null || true
            docker rm   rag_api 2>/dev/null || true

            echo "=== Renaming blue → rag_api ==="
            docker rename rag_api_blue rag_api
            # Update container port back to 8000 by recreating
            docker stop rag_api
            docker run -d \
              --name rag_api \
              --restart unless-stopped \
              -p 8000:8000 \
              -v rag_vectorstore:/app/vectorstore \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
              -e SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              -e ADMIN_USERNAME="${{ secrets.ADMIN_USERNAME }}" \
              -e ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}" \
              -e REDIS_URL="redis://localhost:6379" \
              -e REDIS_ENABLED="true" \
              -e DATABASE_URL="sqlite+aiosqlite:///./rag_llmops.db" \
              "$IMAGE"
            docker rm rag_api_blue 2>/dev/null || true

            # Restore Nginx to port 8000
            sudo sed -i 's/server 127.0.0.1:8001/server 127.0.0.1:8000/' \
              /etc/nginx/sites-available/rag-llmops
            sudo nginx -t && sudo systemctl reload nginx

            echo "=== Deployment complete! ===" && curl -sf http://localhost:8000/health

            echo "=== Pruning old images ==="
            docker image prune -f
