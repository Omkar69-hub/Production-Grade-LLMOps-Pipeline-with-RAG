# ─────────────────────────────────────────────────────────────────────────────
#  Nginx — Production-Grade RAG LLMOps v2
#  Port 80 → FastAPI :8000   |   gzip on   |   rate limiting   |   security headers
# ─────────────────────────────────────────────────────────────────────────────

# Rate-limiting zone (100 req/min per IP — burst up to 20)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# Upstream FastAPI workers
upstream rag_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP Server ───────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;          # replace with your domain

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/css
        text/xml;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header X-XSS-Protection         "1; mode=block"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=()" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/rag-llmops.access.log combined;
    error_log   /var/log/nginx/rag-llmops.error.log  warn;

    # ── Upload size (match MAX_FILE_SIZE_MB in file_utils.py) ─────────────────
    client_max_body_size 50M;

    # ── Proxy all traffic to FastAPI ──────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://rag_backend;
        proxy_http_version 1.1;

        proxy_read_timeout    120s;   # embedding can be slow on cold start
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";        # keepalive to upstream

        # Required for SSE streaming
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
        chunked_transfer_encoding on;
    }

    # ── Health check — bypass rate limiting ───────────────────────────────────
    location = /health {
        proxy_pass         http://rag_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block sensitive files ─────────────────────────────────────────────────
    location ~ /\.(env|git|pem|key) {
        deny all;
        return 404;
    }
}

