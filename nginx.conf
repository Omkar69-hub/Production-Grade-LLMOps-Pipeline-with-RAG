# ─────────────────────────────────────────────────────────────────────────────
#  Nginx Reverse Proxy — Production-Grade RAG LLMOps
#  Forwards public port 80  →  FastAPI running on port 8000
#  Place this file at: /etc/nginx/sites-available/rag-llmops
#  Enable with: sudo ln -s /etc/nginx/sites-available/rag-llmops /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zone (100 req/min per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

upstream rag_backend {
    # FastAPI / uvicorn running on the host
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name _;          # replace with your domain, e.g. api.example.com

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/rag-llmops.access.log;
    error_log   /var/log/nginx/rag-llmops.error.log warn;

    # ── Client body size (allows uploading documents) ─────────────────────────
    client_max_body_size 50M;

    # ── Proxy settings ────────────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://rag_backend;
        proxy_http_version 1.1;

        # Required for long-running requests (embedding can take time)
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";    # keepalive to upstream

        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Health check — bypass rate limiting ───────────────────────────────────
    location /health {
        proxy_pass         http://rag_backend/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
