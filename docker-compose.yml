version: "3.9"

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-llmops:latest
    container_name: rag_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      # Persist the FAISS index between restarts
      - vectorstore_data:/app/vectorstore
      # Mount local data folder for quick dev testing
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  vectorstore_data:
