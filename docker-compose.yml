version: "3.9"

services:
  # ── FastAPI RAG Application ──────────────────────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: rag-llmops:latest
    container_name: rag_api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - vectorstore_data:/app/vectorstore
      - ./data:/app/data:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rag-net

  # ── Redis Cache ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # ── MLflow Tracking Server (optional) ────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: rag_mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root /mlflow/artifacts
        --host 0.0.0.0
        --port 5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
    networks:
      - rag-net
    profiles:
      - mlflow        # start with: docker compose --profile mlflow up

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: rag_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - rag-api
    restart: unless-stopped
    networks:
      - rag-net
    profiles:
      - production    # start with: docker compose --profile production up

volumes:
  vectorstore_data:
  redis_data:
  mlflow_data:

networks:
  rag-net:
    driver: bridge
